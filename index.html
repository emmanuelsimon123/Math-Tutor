<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Math Tutor</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="container">
    <header class="header">
      <h1>AI Math Tutor</h1>
      <p class="subtitle">
        A Socratic math tutor that helps students think through problems step by step.
      </p>
    </header>

    <main class="card">
      <section id="chat" class="chat" aria-live="polite">
        <div class="message assistant">
          <div class="message-bubble">
            Hi! I’m your math tutor. Ask me a math question, and I’ll help guide you step by step instead of just giving the answer.
          </div>
        </div>
      </section>

      <form id="chat-form" class="chat-form">
        <label for="user-input" class="label">Ask a math question</label>
        <textarea
          id="user-input"
          class="textarea"
          rows="4"
          placeholder="Example: How do I solve 2x + 5 = 11?"
          required
        ></textarea>

        <div class="button-row">
          <button type="submit" id="send-button" class="button">Send</button>
          <button type="button" id="clear-button" class="button secondary">New Chat</button>
        </div>
      </form>

      <div id="status" class="status" aria-live="polite"></div>
    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
